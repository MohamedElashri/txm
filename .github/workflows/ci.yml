name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # sanad: ref=v7.0.0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # sanad: ref=v6.4.0
      with:
        go-version: '1.24'
        check-latest: true

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: make build

    - name: Run Tests
      run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # sanad: ref=v7.0.0
    
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # sanad: ref=v6
      with:
        go-version: '1.24'
        
    - name: golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # sanad: ref=v9.2.1
      with:
        version: latest
        args: --timeout=5m
