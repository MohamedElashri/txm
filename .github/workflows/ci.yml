name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # sanad: ref=v7.0.0

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # sanad: ref=v7.0.0
      with:
        go-version: '1.26.0'
        check-latest: true

    - name: Set up Zig
      run: |
        ZIG_URL=$(curl -s https://ziglang.org/download/index.json | jq -r '.["0.15.2"]."x86_64-linux".tarball')
        cd /tmp
        wget $ZIG_URL -O zig.tar.xz
        tar xf zig.tar.xz
        DIR=$(ls -d zig-x86_64-linux-* | head -n 1)
        echo "/tmp/$DIR" >> $GITHUB_PATH

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: |
        go clean -cache
        make build

    - name: Run Tests
      run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # sanad: ref=v7.0.0
    
    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # sanad: ref=v7.0.0
      with:
        go-version: '1.26.0'

    - name: Set up Zig
      run: |
        ZIG_URL=$(curl -s https://ziglang.org/download/index.json | jq -r '.["0.15.2"]."x86_64-linux".tarball')
        cd /tmp
        wget $ZIG_URL -O zig.tar.xz
        tar xf zig.tar.xz
        DIR=$(ls -d zig-x86_64-linux-* | head -n 1)
        echo "/tmp/$DIR" >> $GITHUB_PATH

    - name: Build dependencies
      run: make build-deps
        
    - name: golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # sanad: ref=v9.2.1
      with:
        version: latest
        args: --timeout=5m
      env:
        PKG_CONFIG_PATH: ${{ github.workspace }}/.ghostty-host/share/pkgconfig
        CGO_ENABLED: 1
